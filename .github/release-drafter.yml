name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "New Features"
    labels:
      - feature
      - enhancement
  - title: "Bug Fixes"
    labels:
      - fix
      - bugfix
      - bug
  - title: "Maintenance"
    labels:
      - chore
      - maintenance
      - dependencies
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
version-template: "$MAJOR.$MINOR.$PATCH"
initial-version: "1.0.1"
version-resolver:
  major:
    labels:
      - major
  minor:
    labels:
      - minor
      - feature
      - enhancement
  patch:
    labels:
      - patch
      - fix
      - bugfix
      - bug
  default: patch
template: |
  ## Changes

  $CHANGES
